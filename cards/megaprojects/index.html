<meta charset="utf-8" />
<meta name="viewport" content="width=1080, initial-scale=1" />
<title>Megaprojects Card · 데이터센터 vs 초대형 프로젝트</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
/>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>
  :root {
    --accent: #ffb020;         /* 강조색: 핫 앰버 */
    --accent-soft: #ffcb5c;
    --bg: #0a0e17;
    --ink: #f4f6fb;
    --ink-dim: #aeb7c6;
    --ink-faint: #6b7484;
    --font: "Pretendard Variable", Pretendard, -apple-system,
      BlinkMacSystemFont, system-ui, "Apple SD Gothic Neo", "Malgun Gothic",
      sans-serif;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #05070c;
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* 미리보기용 스케일 래퍼 — #card 실제 크기는 1080×1350 유지 */
  #stage {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px;
  }

  #card {
    position: relative;
    width: 1080px;
    height: 1350px;
    flex: 0 0 auto;
    background:
      radial-gradient(720px 520px at 82% 8%, rgba(255, 176, 32, 0.16), transparent 60%),
      radial-gradient(680px 620px at 6% 40%, rgba(34, 96, 160, 0.20), transparent 62%),
      radial-gradient(900px 700px at 60% 108%, rgba(255, 176, 32, 0.08), transparent 58%),
      linear-gradient(160deg, #0c1220 0%, #0a0e17 46%, #070a12 100%);
    color: var(--ink);
    overflow: hidden;
    isolation: isolate;
  }

  /* 미세 디더/노이즈 텍스처 */
  #card::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.05;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-size: 200px 200px;
  }

  /* 상단 얇은 앰버 라인 악센트 */
  #card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--accent) 22%, var(--accent-soft) 50%, var(--accent) 78%, transparent);
    opacity: 0.85;
    z-index: 3;
  }

  .region { position: relative; z-index: 2; }

  /* ── 헤더 ── */
  .header {
    padding: 70px 76px 0 76px;
    height: 390px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 21px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--accent);
    text-transform: uppercase;
    padding: 11px 20px;
    border: 1.5px solid rgba(255, 176, 32, 0.42);
    border-radius: 999px;
    background: rgba(255, 176, 32, 0.06);
  }
  .chip .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px 2px rgba(255, 176, 32, 0.7);
  }

  .headline {
    margin: 34px 0 0 0;
    font-size: 78px;
    line-height: 1.06;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .headline .hot { color: var(--accent); }

  .subtitle {
    margin: 26px 0 0 0;
    font-size: 26px;
    font-weight: 500;
    line-height: 1.4;
    color: var(--ink-dim);
    max-width: 900px;
  }

  /* ── 차트 ── */
  .chart-region {
    padding: 0 40px;
    height: 690px;
  }
  #chart { width: 1000px; height: 690px; }

  /* ── 푸터 ── */
  .footer {
    padding: 0 76px 60px 76px;
    height: 270px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .callout {
    display: flex;
    align-items: stretch;
    gap: 0;
    border-top: 1px solid rgba(255, 255, 255, 0.10);
    padding-top: 30px;
  }
  .callout .cell {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .callout .cell.vs {
    flex: 0 0 auto;
    justify-content: center;
    align-items: center;
    padding: 0 34px;
    color: var(--ink-faint);
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 0.02em;
  }
  .cell .big {
    font-size: 60px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .cell .big.hot { color: var(--accent); }
  .cell .big.cold { color: var(--ink); }
  .cell .lbl {
    font-size: 24px;
    font-weight: 600;
    color: var(--ink-dim);
  }
  .cell .lbl .yrs.hot { color: var(--accent-soft); font-weight: 800; }

  .source {
    margin-top: 26px;
    font-size: 15px;
    line-height: 1.5;
    color: var(--ink-faint);
    max-width: 860px;
  }

  .watermark {
    position: absolute;
    right: 40px;
    bottom: 26px;
    z-index: 4;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: rgba(255, 255, 255, 0.30);
  }
  .watermark b { color: rgba(255, 176, 32, 0.55); font-weight: 800; }
</style>

<div id="stage">
  <div id="card">
    <!-- 헤더 -->
    <div class="region header">
      <span class="chip"><span class="dot"></span>MONEY MAP · 돈의 크기</span>
      <h1 class="headline">
        데이터센터, <span class="hot">반세기 대업</span>을<br />단 6년에 삼키다
      </h1>
      <p class="subtitle">
        AI 데이터센터 capex vs 역사적 초대형 프로젝트 · 인플레조정 누적비용(2024$)
      </p>
    </div>

    <!-- 차트 -->
    <div class="region chart-region">
      <div id="chart"></div>
    </div>

    <!-- 푸터 -->
    <div class="region footer">
      <div class="callout">
        <div class="cell">
          <span class="big hot">$1,179B</span>
          <span class="lbl">AI 데이터센터 · <span class="yrs hot">단 6년</span></span>
        </div>
        <div class="cell vs">VS</div>
        <div class="cell">
          <span class="big cold">$634B</span>
          <span class="lbl">주간고속도로 · 37년</span>
        </div>
      </div>
      <p class="source">
        출처: FHWA·GAO·NASA·Planetary Society 등 · 역사 6종은 총액→기간 선형누적
        근사(실제 지출곡선 아님) · 데이터센터=5사 capex 프록시(비-DC 포함), 2026은
        계획/가이던스
      </p>
    </div>

    <div class="watermark"><b>@hwangincheol</b> · chartbook</div>
  </div>
</div>

<script>
  /* ── 데이터 인라인 (megaprojects_reconstructed.json 전체) ── */
  const DATA = {
    "id": "megaprojects_reconstructed",
    "type": "timeseries",
    "title": "데이터센터 vs. 초대형 프로젝트",
    "unit": "USD(2024$B)",
    "xAxisName": "프로그램 시작 후 경과 연차",
    "series": [
      {
        "name": "AI 데이터센터 capex (실측, 5사 합산)",
        "data": [[0,94.5],[1,221.5],[2,380.4],[3,527.4],[4,765.9],[5,1179.1]]
      },
      {
        "name": "AI 데이터센터 capex (2026 계획/가이던스)",
        "data": [[5,1179.1],[6,1879.1]]
      },
      {
        "name": "주간고속도로 (Interstate Highway)",
        "data": [[0,0.0],[1,17.1],[2,34.3],[3,51.4],[4,68.5],[5,85.7],[6,102.8],[7,119.9],[8,137.1],[9,154.2],[10,171.4],[11,188.5],[12,205.6],[13,222.8],[14,239.9],[15,257.0],[16,274.2],[17,291.3],[18,308.4],[19,325.6],[20,342.7],[21,359.8],[22,377.0],[23,394.1],[24,411.2],[25,428.4],[26,445.5],[27,462.6],[28,479.8],[29,496.9],[30,514.1],[31,531.2],[32,548.3],[33,565.5],[34,582.6],[35,599.7],[36,616.9],[37,634.0]]
      },
      {
        "name": "대륙횡단철도 (US Railroads)",
        "data": [[0,0.0],[1,7.7],[2,15.5],[3,23.2],[4,31.0],[5,38.7],[6,46.5],[7,54.2],[8,62.0],[9,69.7],[10,77.5],[11,85.2],[12,93.0],[13,100.7],[14,108.5],[15,116.2],[16,123.9],[17,131.7],[18,139.4],[19,147.2],[20,154.9],[21,162.7],[22,170.4],[23,178.2],[24,185.9],[25,193.7],[26,201.4],[27,209.2],[28,216.9],[29,224.6],[30,232.4],[31,240.1],[32,247.9],[33,255.6],[34,263.4],[35,271.1],[36,278.9],[37,286.6],[38,294.4],[39,302.1],[40,309.9],[41,317.6],[42,325.4],[43,333.1],[44,340.8],[45,348.6],[46,356.3],[47,364.1],[48,371.8],[49,379.6],[50,387.3],[51,395.1],[52,402.8],[53,410.6],[54,418.3],[55,426.1],[56,433.8],[57,441.5],[58,449.3],[59,457.0],[60,464.8],[61,472.5],[62,480.3],[63,488.0],[64,495.8],[65,503.5],[66,511.3],[67,519.0],[68,526.8],[69,534.5],[70,542.3],[71,550.0]]
      },
      {
        "name": "F-35 Program",
        "data": [[0,0.0],[1,16.0],[2,32.0],[3,48.0],[4,64.0],[5,80.0],[6,96.0],[7,112.0],[8,128.0],[9,144.0],[10,160.0],[11,176.0],[12,192.0],[13,208.0],[14,224.0],[15,240.0],[16,256.0],[17,272.0],[18,288.0],[19,304.0],[20,320.0],[21,336.0],[22,352.0],[23,368.0],[24,384.0],[25,400.0]]
      },
      {
        "name": "아폴로 (Apollo)",
        "data": [[0,0.0],[1,18.4],[2,36.7],[3,55.1],[4,73.4],[5,91.8],[6,110.1],[7,128.5],[8,146.9],[9,165.2],[10,183.6],[11,201.9],[12,220.3],[13,238.6],[14,257.0]]
      },
      {
        "name": "마셜플랜 (Marshall Plan)",
        "data": [[0,0.0],[1,42.5],[2,85.0],[3,127.5],[4,170.0]]
      },
      {
        "name": "국제우주정거장 (ISS)",
        "data": [[0,0.0],[1,5.6],[2,11.1],[3,16.7],[4,22.2],[5,27.8],[6,33.3],[7,38.9],[8,44.4],[9,50.0],[10,55.6],[11,61.1],[12,66.7],[13,72.2],[14,77.8],[15,83.3],[16,88.9],[17,94.4],[18,100.0],[19,105.6],[20,111.1],[21,116.7],[22,122.2],[23,127.8],[24,133.3],[25,138.9],[26,144.4],[27,150.0]]
      }
    ]
  };

  /* 역사 프로젝트: 저채도 회색 톤(미묘한 명도차) + 라인 끝 축약 라벨 */
  const HIST = {
    "주간고속도로 (Interstate Highway)": { short: "주간고속도로", color: "#9aa4b4", width: 3, off: [8, -2] },
    "대륙횡단철도 (US Railroads)":        { short: "철도",       color: "#79828f", width: 2, off: [8, 0] },
    "F-35 Program":                       { short: "F-35",       color: "#828b98", width: 2, off: [8, 2] },
    "아폴로 (Apollo)":                    { short: "아폴로",     color: "#6c7480", width: 2, off: [10, -14] },
    "마셜플랜 (Marshall Plan)":           { short: "마셜플랜",   color: "#5c636e", width: 2, off: [-4, 22] },
    "국제우주정거장 (ISS)":               { short: "ISS",        color: "#525863", width: 2, off: [8, 4] }
  };

  const ACCENT = "#ffb020";
  const AXIS = "#3a4150";
  const AXIS_LABEL = "#8892a2";

  const byName = (n) => DATA.series.find((s) => s.name === n).data;

  const series = [];

  // 역사 6종 (뒤에 깔림)
  Object.keys(HIST).forEach((name) => {
    const cfg = HIST[name];
    series.push({
      name: cfg.short,
      type: "line",
      data: byName(name),
      showSymbol: false,
      smooth: false,
      z: 2,
      lineStyle: { color: cfg.color, width: cfg.width },
      emphasis: { disabled: true },
      endLabel: {
        show: true,
        formatter: cfg.short,
        color: cfg.color,
        fontSize: 20,
        fontWeight: 600,
        offset: cfg.off
      }
    });
  });

  // 데이터센터 실측 (강조 실선)
  series.push({
    name: "AI 데이터센터 (실측)",
    type: "line",
    data: byName("AI 데이터센터 capex (실측, 5사 합산)"),
    showSymbol: true,
    symbolSize: 9,
    itemStyle: { color: ACCENT },
    z: 10,
    lineStyle: {
      color: ACCENT,
      width: 6,
      shadowColor: "rgba(255,176,32,0.55)",
      shadowBlur: 18
    },
    areaStyle: {
      color: {
        type: "linear", x: 0, y: 0, x2: 0, y2: 1,
        colorStops: [
          { offset: 0, color: "rgba(255,176,32,0.22)" },
          { offset: 1, color: "rgba(255,176,32,0.0)" }
        ]
      }
    },
    emphasis: { disabled: true }
  });

  // 데이터센터 계획 (강조 점선) + 끝점 강조 마커/라벨
  series.push({
    name: "AI 데이터센터 (2026 계획)",
    type: "line",
    data: byName("AI 데이터센터 capex (2026 계획/가이던스)"),
    showSymbol: true,
    symbolSize: 11,
    itemStyle: { color: ACCENT },
    z: 11,
    lineStyle: {
      color: ACCENT,
      width: 6,
      type: "dashed",
      shadowColor: "rgba(255,176,32,0.5)",
      shadowBlur: 16
    },
    emphasis: { disabled: true },
    endLabel: {
      show: true,
      formatter: "6년 · $1,879B",
      color: "#0a0e17",
      backgroundColor: ACCENT,
      padding: [7, 12],
      borderRadius: 8,
      fontSize: 23,
      fontWeight: 800,
      offset: [10, 0]
    },
    markPoint: {
      symbol: "circle",
      symbolSize: 16,
      data: [{ coord: [6, 1879.1] }],
      itemStyle: {
        color: ACCENT,
        borderColor: "#fff2d6",
        borderWidth: 2,
        shadowColor: "rgba(255,176,32,0.9)",
        shadowBlur: 20
      },
      label: { show: false }
    }
  });

  const chart = echarts.init(document.getElementById("chart"), null, {
    renderer: "canvas",
    width: 1000,
    height: 690
  });

  chart.setOption({
    animation: false,
    backgroundColor: "transparent",
    grid: { left: 96, right: 168, top: 40, bottom: 78 },
    xAxis: {
      type: "value",
      name: "프로그램 시작 후 경과 연차",
      nameLocation: "middle",
      nameGap: 44,
      nameTextStyle: { color: AXIS_LABEL, fontSize: 22, fontWeight: 600 },
      min: 0,
      max: 72,
      interval: 12,
      axisLine: { lineStyle: { color: AXIS } },
      axisTick: { show: false },
      axisLabel: {
        color: AXIS_LABEL,
        fontSize: 19,
        formatter: (v) => v + "년"
      },
      splitLine: {
        show: true,
        lineStyle: { color: "rgba(255,255,255,0.045)" }
      }
    },
    yAxis: {
      type: "value",
      name: "누적비용 (2024$, $B)",
      nameLocation: "end",
      nameGap: 20,
      nameTextStyle: { color: AXIS_LABEL, fontSize: 20, fontWeight: 600, align: "left" },
      min: 0,
      max: 2000,
      interval: 500,
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: {
        color: AXIS_LABEL,
        fontSize: 19,
        formatter: (v) => "$" + v.toLocaleString() + "B"
      },
      splitLine: {
        show: true,
        lineStyle: { color: "rgba(255,255,255,0.06)" }
      }
    },
    series: series
  });
</script>
