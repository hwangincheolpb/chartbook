<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>차트 제작/관리 툴</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root { --bg:#faf9f7; --card:#fff; --bd:#e5e3df; --tx:#1c1917; --mut:#78716c; --accent:#1d4ed8; --danger:#dc2626; }
    * { box-sizing:border-box; }
    body { margin:0; font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--tx); }
    header { padding:14px 20px; border-bottom:1px solid var(--bd); background:var(--card); position:sticky; top:0; z-index:5; }
    header h1 { margin:0; font-size:17px; }
    header .sub { color:var(--mut); font-size:12px; margin-top:2px; }
    .wrap { display:grid; grid-template-columns: 1fr 1fr; gap:16px; padding:16px 20px; align-items:start; }
    .col { display:flex; flex-direction:column; gap:14px; }
    .card { background:var(--card); border:1px solid var(--bd); border-radius:10px; padding:14px; }
    .card h2 { margin:0 0 10px; font-size:14px; }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    input, select, textarea { padding:8px 10px; border:1px solid var(--bd); border-radius:7px; font:inherit; background:#fff; }
    input[type=text]{ flex:1; min-width:160px; }
    button { padding:8px 12px; border:1px solid var(--bd); border-radius:7px; background:#fff; cursor:pointer; font:inherit; }
    button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    button.danger { color:var(--danger); border-color:#f3c7c7; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .results { max-height:300px; overflow:auto; border:1px solid var(--bd); border-radius:8px; }
    .result { padding:8px 10px; border-bottom:1px solid var(--bd); cursor:pointer; }
    .result:hover { background:#f3f4f6; }
    .result.sel { background:#eef2ff; }
    .result .lbl { font-weight:600; }
    .result .meta { color:var(--mut); font-size:12px; }
    .badge { display:inline-block; font-size:11px; padding:1px 6px; border-radius:10px; background:#f3f4f6; color:var(--mut); margin-right:4px; }
    .badge.src { background:#eef2ff; color:var(--accent); }
    .field { display:flex; flex-direction:column; gap:3px; margin-bottom:8px; }
    .field label { font-size:12px; color:var(--mut); }
    .muted { color:var(--mut); font-size:12px; }
    .sources { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
    .src-chip { font-size:11px; padding:2px 8px; border-radius:10px; border:1px solid var(--bd); }
    .src-chip.on { background:#dcfce7; border-color:#bbf7d0; color:#166534; }
    .src-chip.off { background:#f3f4f6; color:#9ca3af; }
    .chart-list .topic { font-weight:700; margin:10px 0 4px; }
    .chart-item { display:flex; justify-content:space-between; align-items:center; padding:6px 8px; border:1px solid var(--bd); border-radius:7px; margin-bottom:5px; }
    .chart-item .info { font-size:13px; }
    .chart-item .info .id { color:var(--mut); font-size:11px; }
    canvas { max-height:240px; }
    #toast { position:fixed; bottom:20px; right:20px; background:#1c1917; color:#fff; padding:10px 14px; border-radius:8px; opacity:0; transition:opacity .2s; pointer-events:none; }
    #toast.show { opacity:1; }
  </style>
</head>
<body>
  <header>
    <h1>차트 제작/관리 툴</h1>
    <div class="sub">키워드 검색 → 미리보기 → 주제 선택 → 차트북에 추가. 레지스트리: <code>data/index.json</code></div>
    <div class="sources" id="sources"></div>
  </header>

  <div class="wrap">
    <!-- 좌: 검색 + 미리보기 + 추가폼 -->
    <div class="col">
      <div class="card">
        <h2>1. 데이터 검색</h2>
        <div class="row">
          <input type="text" id="q" placeholder="예: korea gdp / EWY / 삼성전자 / 005930" />
          <select id="source">
            <option value="all">전체</option>
            <option value="dbnomics">DBnomics</option>
            <option value="yfinance">Yahoo</option>
            <option value="krx">KRX</option>
            <option value="fred">FRED 🔑</option>
            <option value="ecos">ECOS 🔑</option>
          </select>
          <button class="primary" id="searchBtn">검색</button>
        </div>
        <div class="results" id="results" style="margin-top:10px;"><div class="muted" style="padding:10px;">검색 결과가 여기 표시됩니다.</div></div>
      </div>

      <div class="card">
        <h2>2. 미리보기</h2>
        <div class="muted" id="previewMeta">시리즈를 선택하면 미니차트가 표시됩니다.</div>
        <canvas id="previewChart"></canvas>
      </div>
    </div>

    <!-- 우: 추가폼 + 레지스트리 목록 -->
    <div class="col">
      <div class="card">
        <h2>3. 차트로 추가</h2>
        <div class="field"><label>선택된 소스/ID</label><input type="text" id="selInfo" readonly placeholder="(좌측에서 선택)" /></div>
        <div class="field"><label>제목</label><input type="text" id="title" /></div>
        <div class="field"><label>요약 (subtitle)</label><input type="text" id="summary" /></div>
        <div class="row">
          <div class="field" style="flex:1;"><label>타입</label>
            <select id="type"><option value="line">line</option><option value="bar">bar</option></select>
          </div>
          <div class="field" style="flex:1;"><label>단위(unit)</label><input type="text" id="unit" placeholder="index / % / USD / 원" /></div>
          <div class="field" style="flex:1;"><label>변환</label>
            <select id="transform"><option value="none">none</option><option value="yoy">YoY %</option><option value="index100">index100</option></select>
          </div>
        </div>
        <div class="field"><label>주제 (기존 선택 또는 신규 입력)</label>
          <div class="row">
            <select id="topicSel" style="flex:1;"></select>
            <input type="text" id="topicNew" placeholder="신규 주제명 (입력 시 우선)" style="flex:1;" />
          </div>
        </div>
        <div class="field"><label>출처 메모 (sourceNote)</label><input type="text" id="sourceNote" /></div>
        <button class="primary" id="addBtn" disabled>차트북에 추가</button>
      </div>

      <div class="card">
        <h2>4. 현재 레지스트리</h2>
        <div class="row" style="margin-bottom:8px;">
          <button id="refreshAllBtn">툴 차트 전체 갱신</button>
          <button id="reloadBtn">목록 새로고침</button>
        </div>
        <div class="chart-list" id="chartList"></div>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="/admin/app.js"></script>
</body>
</html>
